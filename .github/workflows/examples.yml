name: examples

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [langgraph, anthropic]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Build the SDK the examples link against
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Typecheck example against real framework types
        working-directory: examples/${{ matrix.example }}
        run: |
          pnpm install
          pnpm typecheck
